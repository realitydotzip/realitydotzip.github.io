<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reality.zip</title>
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-text-primary: #000000;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--color-background-primary);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
        }

        body {
            display: flex;
            justify-content: center;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 60px;
        }

        .wrap {
            width: 100%;
            max-width: 640px;
            text-align: center;
            padding: calc(50vh - 80px) 20px 120px;
            margin: 0 auto;
        }

        @media (max-width: 640px) {
            .wrap {
                padding: calc(50vh - 80px) 30px 120px;
            }
        }

        .item {
            display: block;
            margin: 120px 0;
            text-decoration: none;
            color: inherit;
            opacity: 1;
            transition: opacity 2.8s cubic-bezier(0.22, 1, 0.36, 1), filter 0.8s ease;
            font-size: 15px;
            line-height: 1.6;
        }

        .item:hover {
            opacity: 1;
        }

        .item.focused {
            opacity: 1;
            filter: none;
        }

        .item.blurred-soft {
            filter: blur(1.5px);
            opacity: 0.5;
        }

        .item.blurred {
            filter: blur(3px);
            opacity: 0.35;
        }

        .item.is-new {
            opacity: 0;
        }

        #sentinel {
            height: 40px;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="title">reality.zip</div>
        <div id="feed"></div>
        <div id="sentinel"></div>
    </main>

    <script>
        const feed = document.getElementById('feed');
        const sentinel = document.getElementById('sentinel');
        const copy = [
            'xxx',
            'xxx',
            'xxx',
            'xxx',
            'xxxx'
        ];

        let i = 0;
        let loading = false;

        function addItem(indexInBatch = 0) {
            const el = document.createElement('div');
            el.className = 'item is-new';
            el.textContent = copy[i % copy.length];
            i++;
            feed.appendChild(el);
            const baseDelay = 400;
            const step = 180;
            const delay = baseDelay + indexInBatch * step;
            setTimeout(() => {
                el.classList.remove('is-new');
            }, delay);
        }

        function loadMore() {
            if (loading) return;
            loading = true;
            for (let j = 0; j < 6; j++) {
                addItem(j);
            }
            setTimeout(() => {
                loading = false;
            }, 1200);
        }

        function updateFocusedItem() {
            const items = Array.from(feed.querySelectorAll('.item'));
            const viewportCenter = window.innerHeight / 2;

            let closest = null;
            let closestDistance = Infinity;
            let closestIndex = -1;

            items.forEach((item, index) => {
                const rect = item.getBoundingClientRect();
                const itemCenter = rect.top + rect.height / 2;
                const distance = Math.abs(itemCenter - viewportCenter);

                if (distance < closestDistance) {
                    closestDistance = distance;
                    closest = item;
                    closestIndex = index;
                }
            });

            items.forEach((item, index) => {
                item.classList.remove('focused', 'blurred', 'blurred-soft');

                const distance = Math.abs(index - closestIndex);
                if (distance <= 1) {
                    item.classList.add('focused');
                } else if (distance <= 3) {
                    item.classList.add('blurred-soft');
                } else {
                    item.classList.add('blurred');
                }
            });
        }

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadMore();
            }
        }, {
            rootMargin: '200px'
        });

        observer.observe(sentinel);

        for (let j = 0; j < 18; j++) {
            addItem(j);
        }

        window.addEventListener('scroll', updateFocusedItem, { passive: true });
        updateFocusedItem();
    </script>
</body>
</html>
